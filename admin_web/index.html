<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeTime Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-slot"></div>

    <div class="main">
      <div id="topbar-slot"></div>

      <main class="content">
        <h1 class="page-title">Dashboard</h1>

        <section class="overview">
          <div class="stat-card">
            <span class="stat-label">Bekleyen Randevu</span>
            <span class="stat-value" id="stat-waiting">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Onaylı Randevu</span>
            <span class="stat-value" id="stat-upcoming">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Kayıtlı Kullanıcı</span>
            <span class="stat-value" id="stat-users">-</span>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="app.js?v=2"></script>
</body>
</html>
