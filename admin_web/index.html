<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeTime Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">MeTime Admin</div>

      <nav class="nav">
        <a class="nav-item active" href="#">
          <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon">📅</span> Randevular
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon">👥</span> Kullanıcılar
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon">💇</span> Uzmanlar
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon">💅</span> Hizmetler
        </a>
        <a class="nav-item" href="#">
          <span class="nav-icon">🏬</span> Salon Bilgileri
        </a>
      </nav>

      <div class="sidebar-footer">
        <a class="nav-item" href="#"><span class="nav-icon">❓</span> Yardım</a>
        <a class="nav-item" href="#"><span class="nav-icon">↩</span> Çıkış</a>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <input class="search" type="text" placeholder="Ara..." />
        <div class="topbar-actions">
          <span class="icon-btn">🔔</span>
          <span class="avatar">A</span>
        </div>
      </header>

      <main class="content">
        <h1 class="page-title">Dashboard</h1>

        <section class="overview">
          <div class="stat-card">
            <span class="stat-label">Bekleyen Randevu</span>
            <span class="stat-value" id="stat-waiting">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Onaylı Randevu</span>
            <span class="stat-value" id="stat-upcoming">-</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Kayıtlı Kullanıcı</span>
            <span class="stat-value" id="stat-users">-</span>
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>Bekleyen Randevular</h2>
            <p id="status" class="status"></p>
          </div>
          <table class="bookings-table">
            <thead>
              <tr>
                <th>Salon</th>
                <th>Uzman</th>
                <th>Hizmet</th>
                <th>Tarih</th>
                <th>Saat</th>
                <th>Fiyat</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bookings-body">
              <!-- app.js tarafından doldurulur -->
            </tbody>
          </table>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
