<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş - MeTime Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <form id="login-form" class="login-card">
      <h1 class="login-title">MeTime Admin</h1>
      <p class="login-subtitle">Devam etmek için giriş yap</p>

      <label>
        E-posta
        <input type="email" id="login-email" required autocomplete="username" />
      </label>

      <label>
        Şifre
        <input type="password" id="login-password" required autocomplete="current-password" />
      </label>

      <button type="submit" class="approve-btn login-submit">Giriş Yap</button>
      <p id="login-error" class="status login-error"></p>
    </form>
  </div>

  <script type="module" src="login.js?v=1"></script>
</body>
</html>
