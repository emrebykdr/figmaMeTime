<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uzmanlar - MeTime Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-slot"></div>

    <div class="main">
      <div id="topbar-slot"></div>

      <main class="content">
        <h1 class="page-title">Uzmanlar</h1>

        <section class="card">
          <div class="card-header">
            <h2>Uzman Listesi</h2>
            <p id="list-status" class="status"></p>
          </div>
          <table class="bookings-table">
            <thead>
              <tr>
                <th>Fotoğraf</th>
                <th>İsim</th>
                <th>Şube</th>
                <th>Rol</th>
                <th>Rating</th>
                <th>Çalışma Günü</th>
                <th>İzin Günü</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="professionals-body">
              <!-- uzmanlar.js tarafından doldurulur -->
            </tbody>
          </table>
        </section>

        <section class="card">
          <div class="card-header">
            <h2 id="form-title">Yeni Uzman</h2>
          </div>

          <form id="professional-form" class="booking-form">
            <label>
              İsim
              <input type="text" id="prof-name" required />
            </label>

            <label>
              Şube
              <div class="combobox" id="prof-salon-combobox">
                <input type="text" id="prof-salon-search" placeholder="Şube ara..." autocomplete="off" />
                <input type="hidden" id="prof-salon" />
                <div class="combobox-options" id="prof-salon-options" hidden></div>
              </div>
            </label>

            <label>
              Rol
              <input type="text" id="prof-role" placeholder="Nail designer" required />
            </label>

            <label>
              Rating
              <input type="number" id="prof-rating" min="0" max="5" step="0.1" value="5.0" required />
            </label>

            <label>
              Fotoğraf URL'si
              <div class="field-row">
                <img id="photo-preview" class="photo-preview" alt="" />
                <input type="text" id="prof-photo-url" placeholder="https://..." />
              </div>
            </label>

            <label>
              Çalışma Saatleri
              <table class="availability-table">
                <thead>
                  <tr>
                    <th>Saat</th>
                    <th>Pzt</th>
                    <th>Sal</th>
                    <th>Çar</th>
                    <th>Per</th>
                    <th>Cum</th>
                    <th>Cmt</th>
                    <th>Paz</th>
                  </tr>
                </thead>
                <tbody id="availability-body">
                  <!-- uzmanlar.js tarafından doldurulur -->
                </tbody>
              </table>
            </label>

            <label>
              İzin / Tatil Günleri
              <div class="field-row">
                <input type="date" id="day-off-input" />
                <button type="button" id="add-day-off-btn" class="secondary-btn">Ekle</button>
              </div>
              <div class="day-off-list" id="day-off-list"></div>
            </label>

            <div class="form-actions">
              <button type="submit" id="save-btn" class="approve-btn">Uzman Ekle</button>
              <button type="button" id="reset-btn" class="secondary-btn">Yeni Uzman</button>
              <button type="button" id="delete-btn" class="reject-btn" hidden>Uzmanı Sil</button>
            </div>
            <p id="form-status" class="status"></p>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="uzmanlar.js?v=6"></script>
</body>
</html>
